{% extends 'tracker/base.html' %}

{% block content %}

<h2>Add Subscription</h2>

{% if form.non_field_errors %}
    <div class="alert alert-danger">
        {% for error in form.non_field_errors %}
            {{ error }}
        {% endfor %}
    </div>
{% endif %}

<form method="post">

    {% csrf_token %}
    {{ form.as_p }}

    <button
        type="submit"
        class="btn btn-primary">
        Save
    </button>

</form>

{% endblock %}
